services:
  db:
    image: postgres:16-alpine
    container_name: kidscode-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kidscode
      POSTGRES_PASSWORD: kidscode
      POSTGRES_DB: kidscode
    ports:
      # Host port 5434 to avoid clashing with other local Postgres instances
      - "5434:5432"
    volumes:
      - kidscode-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kidscode -d kidscode"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kidscode-pgdata:
